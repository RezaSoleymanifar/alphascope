name: autonomous-loop

# Cron schedule is COMMENTED OUT by default for safety.
# To enable scheduled runs:
#   1. Add ANTHROPIC_API_KEY to repo secrets (Settings -> Secrets and variables -> Actions)
#      (or use ALPHA_ARCHIVE_LLM_PROVIDER=offline for non-LLM-only loops)
#   2. Uncomment the `schedule` block below
#   3. Push the change
#
# Manual run is always available via "workflow_dispatch" in the Actions tab.

on:
  workflow_dispatch:
    inputs:
      run_learn:
        description: 'Also run LEARN aggregator (weekly meta-meta loop)'
        required: false
        default: 'false'
      auto_apply_actor:
        description: 'Apply actor.md proposals automatically (default: propose only)'
        required: false
        default: 'false'

  # Uncomment to schedule:
  # schedule:
  #   - cron: '0 6 * * *'    # daily 06:00 UTC: poll + triage + replicate + critique
  #   - cron: '0 0 * * 0'    # weekly Sun 00:00 UTC: also run LEARN aggregator

permissions:
  contents: write       # commit metric / proposal artifacts back
  pull-requests: write  # open PRs for actor / critique proposals

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for learn aggregator git-log

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.11'

      - name: Sync env
        run: uv sync

      - name: Run autonomous loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_ARCHIVE_LLM_PROVIDER: anthropic
          PYTHONIOENCODING: utf-8
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.run_learn }}" = "true" ] || \
             [ "${{ github.event.schedule }}" = "0 0 * * 0" ]; then
            ARGS="$ARGS --learn"
          fi
          if [ "${{ github.event.inputs.auto_apply_actor }}" = "true" ]; then
            ARGS="$ARGS --auto-apply"
          fi
          uv run alpha-archive loop $ARGS

      - name: Stage loop artifacts
        run: |
          git config user.name  "alpha-archive-bot"
          git config user.email "alpha-archive-bot@users.noreply.github.com"
          git add data/meta_runs/ data/critique_runs/ data/actor_proposals/ \
                  data/learn_runs/ data/replications/ 2>/dev/null || true

      - name: Commit + push artifacts (no actor.md changes)
        if: success()
        run: |
          if git diff --staged --quiet; then
            echo "no artifacts to commit"
            exit 0
          fi
          git commit -m "chore(loop): autonomous run artifacts $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Loop run by GitHub Actions ${{ github.run_id }}.
          Artifacts only — actor.md / critique.md changes go through PRs."
          git push origin HEAD:main || \
            git push origin HEAD:autonomous-loop-artifacts/$(date -u +%Y%m%dT%H%M%SZ)

      - name: Open PR if actor proposals exist
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PROP_DIR="data/actor_proposals"
          if [ ! -d "$PROP_DIR" ]; then exit 0; fi
          LATEST=$(ls -t "$PROP_DIR" 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then exit 0; fi
          if grep -q "No changes proposed" "$PROP_DIR/$LATEST" 2>/dev/null; then
            echo "no proposed changes — skip PR"
            exit 0
          fi
          BRANCH="actor-proposal-$(date -u +%Y%m%dT%H%M%SZ)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create \
            --title "actor.md proposal: $(date -u +%Y-%m-%d)" \
            --body "$(cat $PROP_DIR/$LATEST)

          ---

          Generated by autonomous loop run ${{ github.run_id }}.
          Per meta/learn.md — proposal only, requires human review + merge." \
            --base main --head "$BRANCH"
